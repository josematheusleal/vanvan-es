# Configurações do Banco H2 em memória para testes
spring.datasource.url=jdbc:h2:mem:vanvantestdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configurações do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Resolve avisos de inicialização
spring.jpa.defer-datasource-initialization=true

# Chave secreta mockada para o JwtService não quebrar nos testes
jwt.secret=chave-secreta-muito-segura-para-testes-mockados
